name: EriksDay
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  EriksDay:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        # Change this to your own reverse-DNS id.
        PRODUCT_BUNDLE_IDENTIFIER: com.example.eriksday
        INFOPLIST_KEY_CFBundleDisplayName: "Erik's Day"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        # iPhone + iPad
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        # Set this so signing survives `xcodegen generate`.
        # Find your Team ID in Xcode > Settings > Accounts, or at
        # developer.apple.com/account (Membership details).
        # DEVELOPMENT_TEAM: ABCDE12345
